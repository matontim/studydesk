<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyDesk</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wall">
    <div class="binder-shelf">
        <section class="binder-wrapper">
            <div class="binder binder-blue">
                <div class="binder-ring"></div>
                <div class="binder-ring"></div>
                <div class="binder-ring"></div>
            </div>
            <div class="shelf-tag">All</div>
        </section>

        <section class="binder-wrapper">
            <div class="binder binder-red">
                <div class="binder-ring"></div>
                <div class="binder-ring"></div>
                <div class="binder-ring"></div>
            </div>
            <div class="shelf-tag">Mathematics</div>
        </section>

        <section class="binder-wrapper">
            <div class="binder binder-blue">
                <div class="binder-ring"></div>
                <div class="binder-ring"></div>
                <div class="binder-ring"></div>
            </div>
            <div class="shelf-tag">Science</div>
        </section>

        <section class="binder-wrapper">
            <div class="binder binder-green">
                <div class="binder-ring"></div>
                <div class="binder-ring"></div>
                <div class="binder-ring"></div>
            </div>
            <div class="shelf-tag">English</div>
        </section>

        <section class="binder-wrapper">
            <div class="binder binder-yellow">
                <div class="binder-ring"></div>
                <div class="binder-ring"></div>
                <div class="binder-ring"></div>
            </div>
            <div class="shelf-tag">History</div>
        </section>
    </div>

    <div class="shelf">
        <section class="paper">
            <div class="hole-punch"></div>
            <div class="hole-punch"></div>
            <div class="hole-punch"></div>
            <h1>My Assignments</h1>
            <table class="assignment-table">
                <thead>
                    <tr>
                        <th>Assignment</th>
                        <th>Subject/Course</th>
                        <th>Due Date</th>
                        <th>Priority</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Chapter 7 Problem Set</td>
                        <td>Mathematics</td>
                        <td>Mar 14</td>
                        <td><span class="dot dot-high"></span>High</td>
                    </tr>
                    <tr>
                        <td>Persuasive Essay</td>
                        <td>English</td>
                        <td>Mar 18</td>
                        <td><span class="dot dot-med"></span>Medium</td>
                    </tr>
                </tbody>
            </table>
        </section>
        <div class="sidebar">
            <section class="bulletin-board">
                <h2>Due Soon</h2>
                <div class="note">
                    <p>Due Date (ex. tomorrow)</p>
                    <p>Assignment</p>
                    <p>Subject</p>
                </div>
                <div class="note">
                    <p>Due Date (ex. tomorrow)</p>
                    <p>Assignment</p>
                    <p>Subject</p>
                </div>
            </section>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
